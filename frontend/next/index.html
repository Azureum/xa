<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XA</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ef;
        --text: #151515;
        --muted: #626a73;
        --line: #ded8cf;
        --panel: #ffffff;
        --accent: #0f766e;
        --accent-strong: #115e59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, 100%);
      }

      .eyebrow {
        margin: 0 0 16px;
        color: var(--accent-strong);
        font-size: 0.82rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        max-width: 840px;
        margin: 0;
        font-size: clamp(3rem, 9vw, 7rem);
        line-height: 0.95;
      }

      p {
        max-width: 660px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 1.15rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }

      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 18px;
        font-weight: 750;
        color: inherit;
        text-decoration: none;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .primary:hover {
        background: var(--accent-strong);
      }

      .secondary {
        background: var(--panel);
        border-color: var(--line);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">XA on Vercel</p>
      <h1>Production starter is live.</h1>
      <p>
        This is a clean static startup instance for the GitHub-linked Vercel
        project.
      </p>
      <div class="actions">
        <a class="primary" href="https://github.com/Azureum/xa">GitHub</a>
        <a class="secondary" href="https://vercel.com/docs">Vercel Docs</a>
      </div>
    </main>
  </body>
</html>
