services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aihost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aihost_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aihost}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs once, only when the data volume is first initialized: emulates
      # the auth schema/roles a real Supabase project already provides. See
      # backend/scripts/bootstrap_local_supabase.sql -- never run against a
      # real Supabase project, which already has all of this.
      - ./backend/scripts/bootstrap_local_supabase.sql:/docker-entrypoint-initdb.d/01-bootstrap-supabase.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aihost}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aihost}:${POSTGRES_PASSWORD:-aihost_dev}@db:5432/${POSTGRES_DB:-aihost}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  dashboard:
    build: ./frontend/dashboard
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://example.supabase.co}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-placeholder-anon-key}
    volumes:
      - ./frontend/dashboard:/app
      - dashboard_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  customer:
    build: ./frontend/customer
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend/customer:/app
      - customer_node_modules:/app/node_modules
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  dashboard_node_modules:
  customer_node_modules:
